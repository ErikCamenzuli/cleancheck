<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

/* ─── EMAILJS CONFIG ─── */
const DEFAULT_CONFIG = {
  serviceId:   "service_b5ta3pi",
  templateId:  "template_xrdy1u4",
  publicKey:   "AsP-BCIALDKZmDdRQ",
  notifyEmail: "cleanbathroomsaus@gmail.com",
};
const EJ_KEY = "cleancheck_ej_config";
const getEJConfig = () => {
  try {
    const stored = JSON.parse(localStorage.getItem(EJ_KEY)||"{}");
    return { ...DEFAULT_CONFIG, ...stored };
  } catch { return DEFAULT_CONFIG; }
};
const saveEJConfig = (cfg) => localStorage.setItem(EJ_KEY, JSON.stringify(cfg));

/* ─── AUTH ─── */
const ADMIN_PIN  = "130197";   // dev/admin PIN
const AUTH_KEY   = "cleancheck_auth";
const getAuth    = () => { try { return JSON.parse(localStorage.getItem(AUTH_KEY)||"null"); } catch { return null; } };
const saveAuth   = (a) => localStorage.setItem(AUTH_KEY, JSON.stringify(a));
const clearAuth  = () => localStorage.removeItem(AUTH_KEY);

/* ─── STORE MANAGER DATA (Supabase) ─── */
const getManagerData = async () => {
  try {
    const { data, error } = await sb.from("managers").select("*");
    if (error) throw error;
    const map = {};
    (data||[]).forEach(m => { map[m.store_id] = { name:m.name, email:m.email, pin:m.pin }; });
    return map;
  } catch(e) { console.error("getManagerData error", e); return {}; }
};
const getStoreManager = async (storeId) => {
  try {
    const { data, error } = await sb.from("managers").select("*").eq("store_id", storeId).single();
    if (error || !data) return { name:"", email:"", pin:"" };
    return { name:data.name||"", email:data.email||"", pin:data.pin||"" };
  } catch(e) { return { name:"", email:"", pin:"" }; }
};
const saveStoreManager = async (storeId, data) => {
  try {
    await sb.from("managers").upsert({ store_id:storeId, name:data.name||"", email:data.email||"", pin:data.pin||"", updated_at:new Date().toISOString() }, { onConflict:"store_id" });
  } catch(e) { console.error("saveStoreManager error", e); }
};

/* ─── SEND EMAIL ─── */
async function sendEmail({ storeName, storeAddress, rating, ratingLabel, tags, comment, isAlert, toEmail }) {
  const cfg = getEJConfig();
  if (!cfg.serviceId || !cfg.templateId || !cfg.publicKey) return { ok:false, error:"not_configured" };
  try {
    emailjs.init(cfg.publicKey);
    const tagList = tags.length ? tags.join(", ") : "None selected";
    const subject = isAlert
      ? `🚨 URGENT: ${rating}★ rating at ${storeName}`
      : `⭐ New ${rating}★ review — ${storeName}`;
    await emailjs.send(cfg.serviceId, cfg.templateId, {
      to_email:      toEmail || cfg.notifyEmail,
      to_name:       "CleanCheck Manager",
      store_name:    storeName,
      store_address: storeAddress,
      rating_stars:  "★".repeat(rating) + "☆".repeat(5-rating),
      rating_label:  ratingLabel,
      rating_number: String(rating),
      tags:          tagList,
      comment:       comment || "No comment left.",
      is_alert:      isAlert ? "YES — IMMEDIATE ACTION REQUIRED" : "No",
      subject,
      timestamp:     new Date().toLocaleString("en-AU"),
    });
    return { ok:true };
  } catch(e) { return { ok:false, error: e?.text||e?.message||"Unknown error" }; }
}

/* ─── STORES ─── */
const STORES = [
  { id:"melb-bourke",   name:"Bourke Street",    city:"Melbourne", state:"VIC", address:"205 Bourke St, Melbourne VIC 3000"   },
  { id:"melb-swanston", name:"Swanston Street",  city:"Melbourne", state:"VIC", address:"318 Swanston St, Melbourne VIC 3000" },
  { id:"syd-george",    name:"George Street",    city:"Sydney",    state:"NSW", address:"580 George St, Sydney NSW 2000"      },
  { id:"syd-pitt",      name:"Pitt Street",      city:"Sydney",    state:"NSW", address:"162 Pitt St, Sydney NSW 2000"        },
  { id:"bris-queen",    name:"Queen Street Mall",city:"Brisbane",  state:"QLD", address:"Queen St Mall, Brisbane QLD 4000"   },
  { id:"per-hay",       name:"Hay Street",       city:"Perth",     state:"WA",  address:"782 Hay St, Perth WA 6000"          },
  { id:"adl-rundle",    name:"Rundle Mall",      city:"Adelaide",  state:"SA",  address:"139 Rundle Mall, Adelaide SA 5000"  },
];
const getStore    = (id) => STORES.find(s=>s.id===id) || STORES[0];
const STAR_LABELS   = ["","Very poor","Poor","Okay","Good","Spotless!"];
const RATING_COLORS = ["","#E24B4A","#E8762A","#F0B429","#5CB85C","#27AE60"];
const ISSUE_TAGS = [
  { id:"dirty-floors",   label:"Dirty floors",      icon:"🧹", neg:true  },
  { id:"no-soap",        label:"No soap",           icon:"🧴", neg:true  },
  { id:"no-paper",       label:"No paper",          icon:"🧻", neg:true  },
  { id:"bad-smell",      label:"Bad smell",         icon:"💨", neg:true  },
  { id:"blocked-toilet", label:"Blocked toilet",    icon:"🚽", neg:true  },
  { id:"dryer-broken",   label:"Hand dryer broken", icon:"💧", neg:true  },
  { id:"all-good",       label:"All good!",         icon:"✅", neg:false },
  { id:"very-clean",     label:"Very clean",        icon:"✨", neg:false },
  { id:"well-stocked",   label:"Well stocked",      icon:"👍", neg:false },
];

/* ─── SUPABASE ─── */
const SUPABASE_URL  = "https://atmhinaflailbgprfwlb.supabase.co";
const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF0bWhpbmFmbGFpbGJncHJmd2xiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2ODI2NTEsImV4cCI6MjA5NTI1ODY1MX0.h3f2GaT-jstqQqidE6KwS70CLAE3do2_BinrwJc7qPc";
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

const saveReview = async (r) => {
  try {
    await sb.from("reviews").insert({
      store_id:  r.storeId,
      rating:    r.rating,
      tags:      r.tags || [],
      comment:   r.comment || "",
      is_alert:  r.isAlert || false,
    });
  } catch(e) { console.error("Supabase save error", e); }
};

const getReviews = async (storeId) => {
  try {
    let query = sb.from("reviews").select("*").order("timestamp", { ascending: false });
    if (storeId) query = query.eq("store_id", storeId);
    const { data, error } = await query;
    if (error) throw error;
    return (data||[]).map(r => ({
      id:        r.id,
      storeId:   r.store_id,
      rating:    r.rating,
      tags:      r.tags || [],
      comment:   r.comment || "",
      isAlert:   r.is_alert,
      timestamp: r.timestamp,
    }));
  } catch(e) { console.error("Supabase fetch error", e); return []; }
};

const seedIfEmpty = () => {};
const avg     = arr => arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : 0;
const timeAgo = ts => {
  const s=(Date.now()-new Date(ts))/1000;
  if(s<60) return "just now";
  if(s<3600) return `${Math.floor(s/60)}m ago`;
  if(s<86400) return `${Math.floor(s/3600)}h ago`;
  return `${Math.floor(s/86400)}d ago`;
};
const ratingColor = r => RATING_COLORS[Math.round(r)]||"#ccc";

/* ═══════════════════════════════════════════════
   SHARED PIN INPUT
═══════════════════════════════════════════════ */
function PinLoginUI({ title, subtitle, onSubmit, onBack, error, loading, pin, setPin }) {
  return (
    <div style={{minHeight:"100vh",background:"#0A0A0A",display:"flex",alignItems:"center",justifyContent:"center",padding:"1rem"}}>
      <div style={{width:"100%",maxWidth:"360px",animation:"fadeUp 0.5s ease both"}}>
        <div style={{textAlign:"center",marginBottom:"2rem"}}>
          <div style={{fontFamily:"'Syne',sans-serif",fontSize:"32px",fontWeight:800,color:"white",marginBottom:"6px"}}>
            clean<span style={{color:"#DA291C"}}>check</span>
          </div>
          <div style={{fontSize:"13px",color:"rgba(255,255,255,0.35)"}}>{subtitle}</div>
        </div>
        <div style={{background:"#141414",border:"1px solid rgba(255,255,255,0.08)",borderRadius:"16px",padding:"2rem"}}>
          <div style={{fontSize:"12px",color:"rgba(255,255,255,0.4)",marginBottom:"8px",textTransform:"uppercase",letterSpacing:"0.06em"}}>{title}</div>

            type="password" value={pin} onChange={e=>{setPin(e.target.value);}}
            onKeyDown={e=>e.key==="Enter"&&onSubmit()}
            placeholder="Enter PIN"
            style={{width:"100%",background:"#1a1a1a",border:`1px solid ${error?"#E24B4A":"rgba(255,255,255,0.12)"}`,borderRadius:"10px",padding:"14px",color:"white",fontSize:"20px",letterSpacing:"0.3em",textAlign:"center",outline:"none",marginBottom:"8px"}}
          />
          {error && <div style={{fontSize:"12px",color:"#E24B4A",marginBottom:"12px",textAlign:"center"}}>{error}</div>}
          {!error && <div style={{height:"20px",marginBottom:"12px"}}></div>}
          <button onClick={onSubmit} disabled={!pin||loading}
            style={{width:"100%",background:pin?"#DA291C":"#2a2a2a",color:pin?"white":"rgba(255,255,255,0.3)",border:"none",borderRadius:"10px",padding:"14px",fontSize:"15px",fontWeight:600,cursor:pin?"pointer":"not-allowed",transition:"all 0.2s"}}>
            {loading
              ? <span style={{display:"flex",alignItems:"center",justifyContent:"center",gap:"8px"}}>
                  <span style={{width:16,height:16,border:"2px solid rgba(255,255,255,0.3)",borderTopColor:"white",borderRadius:"50%",display:"inline-block",animation:"spin 0.7s linear infinite"}}></span>
                  Checking…
                </span>
              : "Login →"}
          </button>
        </div>
        <button onClick={onBack} style={{display:"block",margin:"1.25rem auto 0",background:"transparent",border:"none",color:"rgba(255,255,255,0.25)",fontSize:"12px",cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>← Back</button>
      </div>
    </div>
  );
}

/* Staff login — only accepts manager PINs */
function StaffLoginPage({ onLogin, onBack }) {
  const [pin, setPin]     = useState("");
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);
  const handleSubmit = async () => {
    if (!pin) return;
    setLoading(true);
    const mgmt  = await getManagerData();
    const match = STORES.find(s => mgmt[s.id]?.pin === pin);
    if (match) {
      saveAuth({ role:"manager", storeId:match.id });
      onLogin({ role:"manager", storeId:match.id });
      return;
    }
    setError("Incorrect PIN. Please try again.");
    setLoading(false);
    setPin("");
  };
  return <PinLoginUI title="Store PIN" subtitle="Staff portal — enter your store PIN" onSubmit={handleSubmit} onBack={onBack} error={error} loading={loading} pin={pin} setPin={(v)=>{setPin(v);setError("");}} />;
}

/* Dev login — only accepts the admin PIN */
function DevLoginPage({ onLogin, onBack }) {
  const [pin, setPin]     = useState("");
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);
  const handleSubmit = async () => {
    if (!pin) return;
    setLoading(true);
    await new Promise(r=>setTimeout(r,600));
    if (pin === ADMIN_PIN) {
      saveAuth({ role:"dev", storeId:null });
      onLogin({ role:"dev", storeId:null });
      return;
    }
    setError("Incorrect PIN.");
    setLoading(false);
    setPin("");
  };
  return <PinLoginUI title="Dev PIN" subtitle="Developer portal — restricted access" onSubmit={handleSubmit} onBack={onBack} error={error} loading={loading} pin={pin} setPin={(v)=>{setPin(v);setError("");}} />;
}

/* ═══════════════════════════════════════════════
   QR CARD (reusable)
═══════════════════════════════════════════════ */
function QRCard({ store, size=180, showPrint=true }) {
  const base = window.location.href.split("?")[0];
  const reviewUrl = `${base}?store=${store.id}`;
  const qrImg = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(reviewUrl)}&color=DA291C&bgcolor=FFFFFF&margin=16`;

  const handlePrint = () => {
    const w = window.open("","_blank");
    w.document.write(`<!DOCTYPE html><html><head><title>CleanCheck QR — ${store.name}</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
    <style>
      body{margin:0;display:flex;align-items:center;justify-content:center;min-height:100vh;background:#f5f5f3;font-family:'DM Sans',sans-serif;}
      .c{background:white;border-radius:18px;padding:36px 36px 28px;text-align:center;max-width:320px;box-shadow:0 4px 32px rgba(0,0,0,0.1);}
      .bar{height:6px;background:#DA291C;border-radius:3px;margin-bottom:20px;}
      .logo{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:#0A0A0A;margin-bottom:4px;}
      .logo span{color:#DA291C;}
      .store{font-size:13px;color:#888;margin-bottom:20px;}
      img{width:220px;height:220px;}
      .cta{font-size:15px;font-weight:500;color:#333;margin-top:16px;}
      .sub{font-size:12px;color:#aaa;margin-top:4px;margin-bottom:12px;}
      .url{font-size:9px;color:#ccc;word-break:break-all;}
    </style></head><body><div class="c">
      <div class="bar"></div>
      <div class="logo">clean<span>check</span></div>
      <div class="store">McDonald's ${store.name}, ${store.state}</div>
      <img src="${qrImg}" alt="QR Code"/>
      <div class="cta">📱 Scan to rate our bathroom</div>
      <div class="sub">Takes less than 30 seconds · Anonymous</div>
      <div class="url">${reviewUrl}</div>
    </div></body></html>`);
    w.document.close();
    setTimeout(()=>w.print(),900);
  };

  return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:"12px"}}>
      <div style={{background:"white",borderRadius:"12px",padding:"12px",display:"inline-block"}}>
        <div style={{height:4,background:"#DA291C",borderRadius:2,marginBottom:"10px"}}></div>
        <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:"14px",color:"#0A0A0A",textAlign:"center",marginBottom:"6px"}}>
          clean<span style={{color:"#DA291C"}}>check</span>
        </div>
        <img src={qrImg} alt="QR" style={{width:size,height:size,display:"block"}} />
        <div style={{fontSize:"10px",color:"#888",textAlign:"center",marginTop:"6px"}}>📱 Scan to rate bathroom</div>
      </div>
      {showPrint && (
        <button onClick={handlePrint}
          style={{background:"#DA291C",color:"white",border:"none",borderRadius:"8px",padding:"9px 20px",fontSize:"13px",fontWeight:500,cursor:"pointer",display:"flex",alignItems:"center",gap:"6px"}}>
          🖨️ Print QR code
        </button>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════
   MANAGER PORTAL (single store view)
═══════════════════════════════════════════════ */
function ManagerPortal({ storeId, onLogout }) {
  const store   = getStore(storeId);
  const [reviews, setReviews] = useState([]);
  const mgr     = getStoreManager(storeId);
  useEffect(()=>{
    const load = async () => {
      const [r, mgr] = await Promise.all([getReviews(storeId), getStoreManager(storeId)]);

      setName(mgr.name||"");
      setEmail(mgr.email||"");
    };
    load();
  },[storeId]);

  const [email, setEmail] = useState(mgr.email||"");
  const [saved, setSaved] = useState(false);
  const storeAvg = avg(reviews.map(r=>r.rating));

        .ghost-btn{background:transparent;border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.6);border-radius:8px;padding:7px 14px;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;}
        .ghost-btn:hover{background:rgba(255,255,255,0.07);color:white;}
        .inp{width:100%;background:#1a1a1a;border:1px solid rgba(255,255,255,0.12);border-radius:8px;padding:10px 12px;color:white;font-size:14px;outline:none;font-family:'DM Sans',sans-serif;}
        .inp:focus{border-color:#DA291C;}
        .rrow{padding:1rem;border-bottom:1px solid rgba(255,255,255,0.06);}
        .rrow:last-child{border:none;}
      `}</style>
      <div style={{maxWidth:"900px",margin:"0 auto",padding:"1.5rem"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"2rem",flexWrap:"wrap",gap:"12px"}}>
          <div>
            <div style={{fontFamily:"'Syne',sans-serif",fontSize:"22px",fontWeight:800}}>
              clean<span style={{color:"#DA291C"}}>check</span>

            <div style={{fontSize:"13px",color:"rgba(255,255,255,0.4)",marginTop:"2px"}}>

        {/* Stats row */}

          ))}

        <div style={{display:"grid",gridTemplateColumns:"1fr 260px",gap:"1rem",marginBottom:"1rem"}}>

                    <div>
                      <span style={{color:"#FFC72C",fontSize:"13px"}}>{"★".repeat(r.rating)}{"☆".repeat(5-r.rating)}</span>
                      <span style={{fontSize:"12px",fontWeight:500,color:RATING_COLORS[r.rating]||"#ccc",marginLeft:"6px"}}>{STAR_LABELS[r.rating]}</span>
                    </div>
                    <div style={{fontSize:"11px",color:"rgba(255,255,255,0.28)"}}>{timeAgo(r.timestamp)}</div>
                  </div>
                  {rtags.length>0 && <div style={{display:"flex",flexWrap:"wrap",gap:"4px",marginBottom:"5px"}}>
                    {rtags.map((t,i)=>{
                      const tag=ISSUE_TAGS.find(x=>`${x.icon} ${x.label}`===t||x.id===t);
                      return <span key={i} style={{fontSize:"11px",background:tag?.neg?"rgba(226,75,74,0.15)":"rgba(39,174,96,0.15)",color:tag?.neg?"#ff8585":"#6fcf97",borderRadius:"999px",padding:"2px 8px"}}>{t}</span>;
                    })}
                  </div>}
                  {r.comment&&<div style={{fontSize:"13px",color:"rgba(255,255,255,0.45)",fontStyle:"italic"}}>"{r.comment}"</div>}
                  {r.rating<=2&&<div style={{marginTop:"6px",fontSize:"11px",background:"rgba(226,75,74,0.1)",border:"1px solid rgba(226,75,74,0.3)",borderRadius:"6px",padding:"3px 8px",color:"#ff8585",display:"inline-block"}}>⚡ Alert sent</div>}
                </div>
              );
            })}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════
   EMAIL CONFIG PANEL (dev only)
═══════════════════════════════════════════════ */
function EmailConfigPanel() {
  const saved = getEJConfig();
  const [serviceId,   setServiceId]   = useState(saved.serviceId   || "");
  const [templateId,  setTemplateId]  = useState(saved.templateId  || "");
  const [publicKey,   setPublicKey]   = useState(saved.publicKey   || "");
  const [notifyEmail, setNotifyEmail] = useState(saved.notifyEmail || "");
  const [savedOk,    setSavedOk]    = useState(false);
  const [testing,    setTesting]    = useState(false);
  const [testResult, setTestResult] = useState(null);

  const handleSave = () => {
    saveEJConfig({ serviceId:serviceId.trim(), templateId:templateId.trim(), publicKey:publicKey.trim(), notifyEmail:notifyEmail.trim() });
    setSavedOk(true);
    setTimeout(()=>setSavedOk(false), 2000);
  };

  const handleTest = async () => {
    setTesting(true); setTestResult(null);
    const res = await sendEmail({
      storeName:"Bourke Street, VIC (TEST)", storeAddress:"205 Bourke St, Melbourne VIC 3000",
      rating:2, ratingLabel:"Poor",
      tags:["🧹 Dirty floors","🧴 No soap"],
      comment:"This is a test alert from CleanCheck dev portal.",
      isAlert:true, toEmail:notifyEmail,
    });
    setTesting(false); setTestResult(res);
  };

  return (
    <div style={{maxWidth:"600px"}}>
      <div style={{fontSize:"13px",color:"rgba(255,255,255,0.4)",marginBottom:"1.5rem"}}>
        EmailJS credentials for sending review notifications. These are baked into the app as defaults — update here to override.
      </div>
      <div className="dk-card" style={{padding:"1.5rem",marginBottom:"1rem"}}>
        <div style={{fontSize:"14px",fontWeight:500,color:"white",marginBottom:"1.25rem"}}>EmailJS credentials</div>
        <div style={{display:"flex",flexDirection:"column",gap:"12px",marginBottom:"1.25rem"}}>
          {[
            {label:"Fallback notify email", val:notifyEmail, set:setNotifyEmail, ph:"your@email.com — catches any unrouted alerts"},
            {label:"Public Key",            val:publicKey,   set:setPublicKey,   ph:"e.g. AbCdEfGhIjKlMnOp"},
            {label:"Service ID",            val:serviceId,   set:setServiceId,   ph:"e.g. service_abc123"},
            {label:"Template ID",           val:templateId,  set:setTemplateId,  ph:"e.g. template_xyz789"},
          ].map(({label,val,set,ph})=>(
            <div key={label}>
              <div style={{fontSize:"12px",color:"rgba(255,255,255,0.4)",marginBottom:"5px"}}>{label}</div>
              <input value={val} onChange={e=>set(e.target.value)} placeholder={ph}
                style={{width:"100%",background:"#1a1a1a",border:"1px solid rgba(255,255,255,0.12)",borderRadius:"8px",padding:"10px 12px",color:"white",fontSize:"13px",outline:"none",fontFamily:"'DM Sans',sans-serif"}} />
            </div>
          ))}
        </div>
        <button onClick={handleSave}
          style={{background:"#DA291C",color:"white",border:"none",borderRadius:"8px",padding:"10px 20px",fontSize:"14px",fontWeight:500,cursor:"pointer",marginBottom:"1.25rem"}}>
          {savedOk ? "✓ Saved!" : "Save credentials"}
        </button>
        <div style={{borderTop:"1px solid rgba(255,255,255,0.08)",paddingTop:"1.25rem"}}>
          <div style={{fontSize:"13px",color:"rgba(255,255,255,0.5)",marginBottom:"10px"}}>Send a test alert to <span style={{color:"white"}}>{notifyEmail}</span></div>
          <button onClick={handleTest} disabled={testing}
            style={{background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.12)",color:"white",borderRadius:"8px",padding:"9px 20px",fontSize:"13px",cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>
            {testing ? "Sending…" : "Send test alert"}
          </button>
          {testResult && (
            <div style={{marginTop:"10px",fontSize:"13px",padding:"10px 12px",borderRadius:"8px",
              background:testResult.ok?"rgba(39,174,96,0.1)":"rgba(226,75,74,0.1)",
              color:testResult.ok?"#6fcf97":"#ff8585",
              border:`1px solid ${testResult.ok?"rgba(39,174,96,0.3)":"rgba(226,75,74,0.3)"}`}}>
              {testResult.ok ? "✓ Test email sent! Check your inbox." : `✗ Failed: ${testResult.error}`}
            </div>
          )}
        </div>
      </div>
      <div className="dk-card" style={{padding:"1.25rem"}}>
        <div style={{fontSize:"13px",fontWeight:500,color:"rgba(255,255,255,0.6)",marginBottom:"8px"}}>How email routing works</div>
        <div style={{fontSize:"12px",color:"rgba(255,255,255,0.35)",lineHeight:1.7}}>
          When a review is submitted, CleanCheck first checks if that store has a manager email set (configured in Manage Stores). If yes, the alert goes directly to them. If no manager email is set, it falls back to the notify email above. Low ratings (2★ or under) are flagged as urgent alerts in the subject line.
        </div>
      </div>
    </div>
  );
}

/* Store editor sub-component */
function StoreEditor({ store, mgr, onSave, saved }) {
  const [name,  setName]  = useState(mgr.name||"");
  const [email, setEmail] = useState(mgr.email||"");
  const [pin,   setPin]   = useState(mgr.pin||"");
  const [savedValues, setSavedValues] = useState({ name:mgr.name||"", email:mgr.email||"", pin:mgr.pin||"" });

  useEffect(()=>{
    setName(mgr.name||"");
    setEmail(mgr.email||"");
    setPin(mgr.pin||"");
    setSavedValues({ name:mgr.name||"", email:mgr.email||"", pin:mgr.pin||"" });
  },[mgr.name, mgr.email, mgr.pin]);

  const handleSave = async () => {
    await onSave({name, email, pin});
    setSavedValues({name, email, pin});
  };

  return (
    <div style={{marginTop:"1.25rem",paddingTop:"1.25rem",borderTop:"1px solid rgba(255,255,255,0.08)"}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"12px",marginBottom:"1rem"}}>
        <div>
          <div style={{fontSize:"12px",color:"rgba(255,255,255,0.4)",marginBottom:"5px"}}>Manager name</div>
          <input className="inp" value={name} onChange={e=>setName(e.target.value)} placeholder="Full name" />
          {savedValues.name
            ? <div style={{fontSize:"11px",color:"rgba(255,255,255,0.3)",marginTop:"5px"}}>Saved: <span style={{color:"rgba(255,255,255,0.55)"}}>{savedValues.name}</span></div>
            : <div style={{fontSize:"11px",color:"rgba(255,100,100,0.6)",marginTop:"5px"}}>Not set</div>}
        </div>
        <div>
          <div style={{fontSize:"12px",color:"rgba(255,255,255,0.4)",marginBottom:"5px"}}>Notification email</div>
          <input className="inp" type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="manager@email.com" />
          {savedValues.email
            ? <div style={{fontSize:"11px",color:"rgba(255,255,255,0.3)",marginTop:"5px"}}>Saved: <span style={{color:"#6fcf97"}}>{savedValues.email}</span></div>
            : <div style={{fontSize:"11px",color:"rgba(255,100,100,0.6)",marginTop:"5px"}}>Not set — alerts go to fallback email</div>}
        </div>
        <div>
          <div style={{fontSize:"12px",color:"rgba(255,255,255,0.4)",marginBottom:"5px"}}>Manager login PIN</div>
          <input className="inp" value={pin} onChange={e=>setPin(e.target.value)} placeholder="e.g. 5521" maxLength={8} />
          {savedValues.pin
            ? <div style={{fontSize:"11px",color:"rgba(255,255,255,0.3)",marginTop:"5px"}}>Saved: <span style={{color:"rgba(255,255,255,0.55)"}}>{"•".repeat(savedValues.pin.length)} ({savedValues.pin.length} digits)</span></div>
            : <div style={{fontSize:"11px",color:"rgba(255,100,100,0.6)",marginTop:"5px"}}>Not set — manager can't log in</div>}
        </div>
      </div>
      <button className="red-btn" onClick={handleSave}>
        {saved ? "✓ Saved!" : "Save "+store.name}
      </button>
    </div>
  );
}

function ReviewPage({ storeId }) {
  const store   = getStore(storeId);
  const [rating,     setRating]     = useState(0);
  const [hover,      setHover]      = useState(0);
  const [tags,       setTags]       = useState([]);
  const [comment,    setComment]    = useState("");
  const [submitted,  setSubmitted]  = useState(false);
  const [submitting, setSubmitting] = useState(false);
  const [emailSent,  setEmailSent]  = useState(null);

  const toggleTag = id => setTags(t=>t.includes(id)?t.filter(x=>x!==id):[...t,id]);
  const active = hover||rating;

  const handleSubmit = async () => {
    if (!rating) return;
    setSubmitting(true);
    const tagLabels = ISSUE_TAGS.filter(t=>tags.includes(t.id)).map(t=>`${t.icon} ${t.label}`);
    const isAlert   = rating<=2;
    await saveReview({ storeId:store.id, rating, tags:tagLabels, comment, isAlert });
    // Route to store manager email if set, otherwise fall back to default
    const mgr = await getStoreManager(storeId);
    const toEmail = mgr.email || getEJConfig().notifyEmail;
    const res = await sendEmail({
      storeName:    `${store.name}, ${store.state}`,
      storeAddress: store.address,
      rating, ratingLabel: STAR_LABELS[rating],
      tags: tagLabels, comment, isAlert, toEmail,
    });
    setEmailSent(res.ok);
    setSubmitting(false);
    setSubmitted(true);
  };

  if (submitted) return (
    <div style={{minHeight:"100vh",background:"#f5f5f3",display:"flex",alignItems:"center",justifyContent:"center",padding:"2rem"}}>
      <div style={{textAlign:"center",maxWidth:"360px",animation:"fadeUp 0.5s ease both"}}>
        <div style={{width:80,height:80,background:"#e8f8ef",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 1.5rem",fontSize:"36px"}}>✅</div>
        <h1 style={{fontFamily:"'Syne',sans-serif",fontSize:"28px",fontWeight:800,color:"#0A0A0A",marginBottom:"0.75rem"}}>Thanks!</h1>
        <p style={{color:"#666",fontSize:"15px",lineHeight:1.7,marginBottom:"1.5rem"}}>
          Your review has been received
          {emailSent===true && <> and the {store.name} team has been notified.</>}
          {emailSent===false && <>. <em style={{color:"#E8762A"}}>Note: email alert couldn't send.</em></>}
        </p>
        {rating<=2&&emailSent===true&&(
          <div style={{background:"#fff5f5",border:"1px solid #fca5a5",borderRadius:"10px",padding:"12px 16px",marginBottom:"1.25rem",fontSize:"13px",color:"#b91c1c"}}>
            🚨 A priority alert has been sent.
          </div>
        )}
        <div style={{background:"white",borderRadius:"14px",padding:"1.25rem",textAlign:"left",marginBottom:"1.75rem",border:"1px solid #eee"}}>
          <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"0.75rem"}}>
            <span style={{color:RATING_COLORS[rating],fontSize:"22px"}}>{"★".repeat(rating)}</span>
            <span style={{fontSize:"14px",fontWeight:500,color:RATING_COLORS[rating]}}>{STAR_LABELS[rating]}</span>
          </div>
          {ISSUE_TAGS.filter(t=>tags.includes(t.id)).length>0&&(
            <div style={{display:"flex",flexWrap:"wrap",gap:"5px",marginBottom:comment?"0.75rem":0}}>
              {ISSUE_TAGS.filter(t=>tags.includes(t.id)).map(t=>(
                <span key={t.id} style={{fontSize:"12px",background:"#f3f3f3",borderRadius:"999px",padding:"3px 10px"}}>{t.icon} {t.label}</span>
              ))}
            </div>
          )}
          {comment&&<p style={{fontSize:"13px",color:"#777",margin:0,fontStyle:"italic"}}>"{comment}"</p>}
        </div>
        <button onClick={()=>{window.history.pushState({},"","/");window.location.reload();}}
          style={{background:"#DA291C",color:"white",border:"none",borderRadius:"999px",padding:"12px 28px",fontSize:"14px",fontWeight:500,cursor:"pointer"}}>
          ← Back to CleanCheck
        </button>
      </div>
    </div>
  );

  return (

/* ═══════════════════════════════════════════════
   DASHBOARD (public overview)
═══════════════════════════════════════════════ */
function Dashboard({ onBack }) {
  const [reviews,  setReviews]  = useState([]);
  const [selected, setSelected] = useState("all");
  const [sort,     setSort]     = useState("recent");
  const [loading,  setLoading]  = useState(true);
  useEffect(()=>{ 
    const load = async () => {
      setLoading(true);
      const [r, m] = await Promise.all([getReviews(), getManagerData()]);
      setReviews(r);
      setMgmtData(m);
      setLoading(false);
    };
    load();
  },[]);

  const filtered = reviews.filter(r=>selected==="all"||r.storeId===selected);
  const sorted   = [...filtered].sort((a,b)=>{
    if(sort==="recent") return new Date(b.timestamp)-new Date(a.timestamp);
    if(sort==="worst")  return a.rating-b.rating;
    if(sort==="best")   return b.rating-a.rating;
    return 0;
  });
  const storeStats = STORES.map(s=>{
    const revs=reviews.filter(r=>r.storeId===s.id);
    return {...s,average:avg(revs.map(r=>r.rating)),count:revs.length};
  }).sort((a,b)=>a.average-b.average);

  const overallAvg=avg(reviews.map(r=>r.rating));
  const alertCount=reviews.filter(r=>r.rating<=2).length;
  const todayCount=reviews.filter(r=>new Date(r.timestamp).toDateString()===new Date().toDateString()).length;

  return (
    <div style={{minHeight:"100vh",background:"#0A0A0A",color:"white"}}>
      <style>{`
        .dk-card{background:#141414;border:1px solid rgba(255,255,255,0.08);border-radius:14px;}
        .srow{display:flex;align-items:center;padding:11px 0;border-bottom:1px solid rgba(255,255,255,0.06);gap:12px;cursor:pointer;transition:opacity 0.15s;}
        .srow:last-child{border:none;} .srow:hover{opacity:0.75;}
        .rrow{padding:1rem;border-bottom:1px solid rgba(255,255,255,0.06);}
        .rrow:last-child{border:none;}
        .sel{background:transparent;border:1px solid rgba(255,255,255,0.15);border-radius:8px;color:rgba(255,255,255,0.7);padding:8px 14px;font-size:13px;cursor:pointer;outline:none;}
        .sel option{background:#1a1a1a;}
        .ghost-btn{background:transparent;border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.6);border-radius:8px;padding:7px 14px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;}
        .ghost-btn:hover{background:rgba(255,255,255,0.07);color:white;}
      `}</style>
      <div style={{maxWidth:"1120px",margin:"0 auto",padding:"1.5rem"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"2rem",flexWrap:"wrap",gap:"12px"}}>
          <div style={{display:"flex",alignItems:"center",gap:"16px"}}>
            <button className="ghost-btn" onClick={onBack}>← Back</button>
            <div>
              <div style={{fontFamily:"'Syne',sans-serif",fontSize:"22px",fontWeight:800}}>cleancheck <span style={{color:"#DA291C"}}>dashboard</span></div>
              <div style={{fontSize:"12px",color:"rgba(255,255,255,0.3)"}}>McDonald's Australia · All locations</div>
            </div>
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))",gap:"12px",marginBottom:"1.5rem"}}>
          {[
            {label:"Avg rating",   val:overallAvg.toFixed(1), col:ratingColor(overallAvg)},
            {label:"Total reviews",val:reviews.length,         col:"white"},
            {label:"Today",        val:todayCount,             col:"white"},
            {label:"Alerts (≤2★)", val:alertCount,             col:alertCount>0?"#E24B4A":"#27AE60"},
          ].map(({label,val,col})=>(
            <div key={label} className="dk-card" style={{padding:"1.25rem"}}>
              <div style={{fontSize:"11px",color:"rgba(255,255,255,0.3)",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:"0.4rem"}}>{label}</div>
              <div style={{fontFamily:"'Syne',sans-serif",fontSize:"34px",fontWeight:800,color:col,lineHeight:1}}>{val}</div>
            </div>
          ))}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"320px 1fr",gap:"1rem"}}>
          <div>
            <div style={{fontSize:"11px",color:"rgba(255,255,255,0.3)",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:"0.75rem"}}>Store ratings</div>
            <div className="dk-card" style={{padding:"0.5rem 1.25rem"}}>
              {storeStats.map(s=>(
                <div key={s.id} className="srow" onClick={()=>setSelected(s.id===selected?"all":s.id)}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:"13px",fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",color:s.id===selected?"#DA291C":"white"}}>{s.name}</div>
                    <div style={{fontSize:"11px",color:"rgba(255,255,255,0.3)"}}>{s.city} · {s.count} reviews</div>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:"8px",minWidth:"110px"}}>
                    <div style={{flex:1,background:"rgba(255,255,255,0.08)",borderRadius:"999px",height:4,overflow:"hidden"}}>
                      <div style={{height:"100%",width:`${(s.average/5)*100}%`,background:ratingColor(s.average),borderRadius:"999px"}}></div>
                    </div>
                    <div style={{fontSize:"13px",fontWeight:500,color:ratingColor(s.average),minWidth:"28px"}}>{s.count?s.average.toFixed(1):"—"}</div>
                  </div>
                  {s.average<=2.5&&s.count>0&&<span style={{width:7,height:7,borderRadius:"50%",background:"#E24B4A",display:"inline-block",flexShrink:0}}></span>}
                </div>
              ))}
            </div>
          </div>
          <div>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"0.75rem"}}>
              <div style={{fontSize:"11px",color:"rgba(255,255,255,0.3)",textTransform:"uppercase",letterSpacing:"0.07em"}}>
                Reviews {selected!=="all"&&`— ${STORES.find(s=>s.id===selected)?.name}`}
              </div>
              <div style={{display:"flex",gap:"8px",alignItems:"center"}}>
                {selected!=="all"&&<button className="ghost-btn" onClick={()=>setSelected("all")}>Clear</button>}
                <select className="sel" value={sort} onChange={e=>setSort(e.target.value)}>
                  <option value="recent">Most recent</option>
                  <option value="worst">Worst first</option>
                  <option value="best">Best first</option>
                </select>
              </div>
            </div>
            <div className="dk-card" style={{maxHeight:"520px",overflowY:"auto"}}>
              {loading&&<div style={{padding:"3rem",textAlign:"center",color:"rgba(255,255,255,0.25)",fontSize:"14px",display:"flex",alignItems:"center",justifyContent:"center",gap:"8px"}}><span style={{width:16,height:16,border:"2px solid rgba(255,255,255,0.1)",borderTopColor:"rgba(255,255,255,0.4)",borderRadius:"50%",display:"inline-block",animation:"spin 0.7s linear infinite"}}></span>Loading reviews…</div>}
              {!loading&&sorted.length===0&&<div style={{padding:"3rem",textAlign:"center",color:"rgba(255,255,255,0.25)",fontSize:"14px"}}>No reviews yet</div>}
              {sorted.map(r=>{
                const store=STORES.find(s=>s.id===r.storeId);
                const rtags=Array.isArray(r.tags)?r.tags:[];
                return (
                  <div key={r.id} className="rrow">
                    <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:"6px"}}>
                      <div>
                        <span style={{color:"#FFC72C",fontSize:"13px"}}>{"★".repeat(r.rating)}{"☆".repeat(5-r.rating)}</span>
                        <span style={{fontSize:"12px",fontWeight:500,color:RATING_COLORS[r.rating]||"#ccc",marginLeft:"6px"}}>{STAR_LABELS[r.rating]}</span>
                      </div>
                      <div style={{fontSize:"11px",color:"rgba(255,255,255,0.28)",textAlign:"right"}}>
                        <div>{timeAgo(r.timestamp)}</div>
                        {selected==="all"&&<div style={{color:"rgba(255,255,255,0.45)",marginTop:"2px"}}>{store?.name}, {store?.state}</div>}
                      </div>
                    </div>
                    {rtags.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:"4px",marginBottom:"6px"}}>
                      {rtags.map((t,i)=>{
                        const tag=ISSUE_TAGS.find(x=>`${x.icon} ${x.label}`===t||x.id===t);
                        return <span key={i} style={{fontSize:"11px",background:tag?.neg?"rgba(226,75,74,0.15)":"rgba(39,174,96,0.15)",color:tag?.neg?"#ff8585":"#6fcf97",borderRadius:"999px",padding:"2px 8px"}}>{t}</span>;
                      })}
                    </div>}
                    {r.comment&&<div style={{fontSize:"13px",color:"rgba(255,255,255,0.45)",fontStyle:"italic"}}>"{r.comment}"</div>}
                    {r.rating<=2&&<div style={{marginTop:"8px",fontSize:"11px",background:"rgba(226,75,74,0.1)",border:"1px solid rgba(226,75,74,0.3)",borderRadius:"6px",padding:"4px 10px",color:"#ff8585",display:"inline-block"}}>⚡ Alert sent</div>}
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

        />
        <div style={{display:"flex",flexDirection:"column",gap:"8px"}}>

        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════
   APP ROUTER

function App() {
  const params  = new URLSearchParams(window.location.search);
  const storeId = params.get("store");
  const view    = params.get("view");
  const [auth, setAuth]   = useState(getAuth());
  const [page, setPage]   = useState(()=>{
    if (storeId) return "review";
    if (view==="dashboard") return "dashboard";
    if (view==="login") return "login";
    return "landing";
  });

  const nav = (p) => {
    setPage(p);
    window.history.pushState({},"",(p==="review"||p==="landing"||p==="storepicker")?window.location.pathname+(p==="storepicker"?"?view=storepicker":""):`?view=${p}`);
  };

  const handleLogin = (authData) => {
    setAuth(authData);
    setPage(authData.role==="dev" ? "dev" : "manager");
  };

  const handleLogout = () => {
    clearAuth();
    setAuth(null);
    setPage("landing");
    window.history.pushState({},"",window.location.pathname);
  };

  if (page==="review")    return <ReviewPage storeId={storeId} />;
  if (page==="storepicker") return <StorePicker onPick={id=>{ window.location.href = window.location.pathname+"?store="+id; }} onBack={()=>nav("landing")} />;
  if (page==="dashboard") return <Dashboard onBack={()=>nav("landing")} />;
  if (page==="login")     return <StaffLoginPage onLogin={handleLogin} onBack={()=>nav("landing")} />;
  if (page==="devlogin")  return <DevLoginPage onLogin={handleLogin} onBack={()=>nav("landing")} />;
  if (page==="dev")       return auth?.role==="dev" ? <AdminPortal onLogout={handleLogout} /> : <DevLoginPage onLogin={handleLogin} onBack={()=>nav("landing")} />;
  if (page==="manager")   return auth?.role==="manager" ? <ManagerPortal storeId={auth.storeId} onLogout={handleLogout} /> : <StaffLoginPage onLogin={handleLogin} onBack={()=>nav("landing")} />;
  return <Landing onNav={nav} />;
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(e) { return { error: e }; }
  render() {
    if (this.state.error) {
      return (
        <div style={{padding:"2rem",fontFamily:"monospace",background:"#1a0000",color:"#ff8585",minHeight:"100vh"}}>
          <div style={{fontSize:"18px",fontWeight:"bold",marginBottom:"1rem"}}>CleanCheck Error</div>
          <div style={{fontSize:"14px",marginBottom:"0.5rem"}}>{this.state.error.message}</div>
          <pre style={{fontSize:"12px",whiteSpace:"pre-wrap",color:"rgba(255,150,150,0.7)"}}>{this.state.error.stack}</pre>
        </div>
      );
    }
    return this.props.children;
  }
}
ReactDOM.createRoot(document.getElementById("root")).render(<ErrorBoundary><App /></ErrorBoundary>);
</script>
</body>
</html>
